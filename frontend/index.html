<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiểm Tra Chất Lượng Sản Phẩm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .container { max-width: 1600px; margin: 0 auto; padding: 8px; }
    
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
    }
    header h1 { font-size: 1.8em; margin-bottom: 5px; }
    header p { font-size: 0.95em; opacity: 0.9; }
    
    .wrapper {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 15px;
      min-height: calc(100vh - 150px);
    }
    
    .sidebar {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow-y: auto;
    }
    
    .main {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow-y: auto;
    }
    
    h3 { font-size: 1.1em; margin-bottom: 15px; color: #333; }
    
    .upload-box {
      border: 2px dashed #667eea;
      border-radius: 12px;
      padding: 35px 20px;
      text-align: center;
      cursor: pointer;
      background: linear-gradient(135deg, #f8fbff 0%, #f0f4ff 100%);
      margin-bottom: 20px;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }
    .upload-box:hover { background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 100%); border-color: #764ba2; box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2); transform: translateY(-2px); }
    .upload-box.drag { background: linear-gradient(135deg, #e8ecff 0%, #dfe7ff 100%); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3); border-color: #764ba2; }
    
    .upload-icon { font-size: 2.8em; margin-bottom: 12px; }
    .upload-text { font-size: 1.1em; font-weight: 700; color: #667eea; margin-bottom: 5px; }
    .upload-sub { font-size: 0.8em; color: #888; }
    
    #fileInput { display: none; }
    
    #preview {
      max-width: 100%;
      max-height: 140px;
      border-radius: 6px;
      display: none;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    
    #fileInfo { 
      font-size: 0.75em; 
      color: #666;
      margin-bottom: 12px;
      word-break: break-all;
    }
    
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 0.85em;
      color: #333;
    }
    
    .form-group input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }
    .form-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }
    .form-group input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer; border: none;
    }
    
    .value-badge {
      display: inline-block;
      background: #e0e8ff;
      padding: 3px 8px;
      border-radius: 3px;
      color: #667eea;
      font-weight: bold;
      font-size: 0.8em;
    }
    
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 0.95em;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .status {
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
      font-size: 0.85em;
      border-left: 3px solid;
    }
    .status.show { display: block; }
    .status-info { background: #e3f2fd; color: #1976d2; border-left-color: #1976d2; }
    .status-success { background: #e8f5e9; color: #388e3c; border-left-color: #388e3c; }
    .status-error { background: #ffebee; color: #d32f2f; border-left-color: #d32f2f; }
    
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #f3f3f3;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab-btn {
      padding: 10px 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      font-size: 0.95em;
    }
    .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .result-image {
      width: 100%;
      max-height: 450px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 20px;
    }
    
    .image-section {
      background: linear-gradient(135deg, #f8fbff 0%, #f4f7ff 100%);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #dfe7ff;
    }
    .image-caption { font-size: 0.9em; color: #4b5a7a; margin-bottom: 10px; font-weight: 600; }
    
    .verdict-badge {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 18px;
      border-radius: 8px;
      border-left: 4px solid;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .verdict-icon { font-size: 2.2em; }
    .verdict-status { font-size: 1.2em; font-weight: bold; margin-bottom: 3px; }
    .verdict-desc { font-size: 0.85em; opacity: 0.85; }
    
    .verdict-pass { background: #e8f5e9; border-left-color: #4caf50; color: #1b5e20; }
    .verdict-flag { background: #fff3e0; border-left-color: #ff9800; color: #e65100; }
    .verdict-reject { background: #ffebee; border-left-color: #f44336; color: #b71c1c; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-label { font-size: 0.75em; opacity: 0.9; margin-bottom: 5px; }
    .stat-value { font-size: 1.8em; font-weight: bold; }
    
    .section-title { 
      font-size: 1.15em; 
      margin: 25px 0 18px;
      color: #1a1a1a;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .defect-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      overflow: hidden;
      border: 1px solid #e8ecff;
    }
    .defect-card:hover { 
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2); 
      transform: translateY(-2px);
    }
    
    .defect-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: linear-gradient(135deg, #667eea 0%, #5568d3 100%);
      color: white;
      padding: 14px 16px;
      gap: 12px;
    }
    .defect-name { 
      font-weight: 700; 
      color: white; 
      font-size: 1.05em; 
      flex: 1;
    }
    .severity-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: bold;
      color: white;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .defect-info {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    
    .info-row { 
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px;
      background: #f8fbff;
      border-radius: 8px;
      border: 1px solid #e8ecff;
      transition: all 0.2s;
    }
    .info-row:hover {
      background: #f0f4ff;
      border-color: #667eea;
    }
    
    .info-label { 
      font-weight: 600; 
      color: #667eea; 
      display: flex; 
      align-items: center; 
      gap: 5px;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .info-value { 
      color: #1a1a1a; 
      font-weight: 700;
      font-size: 1.15em;
    }
    
    .report-box {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      border-left: 3px solid #667eea;
    }
    .report-title { font-weight: 600; color: #667eea; margin-bottom: 8px; font-size: 0.9em; }
    .report-content { font-size: 0.85em; color: #555; line-height: 1.5; }
    
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #999;
    }
    
    .history-item {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 3px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-info { flex: 1; }
    .history-time { font-size: 0.8em; color: #999; margin-top: 4px; }
    .history-badge {
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: bold;
      color: white;
      white-space: nowrap;
    }
    
    @media (max-width: 900px) {
      .wrapper { grid-template-columns: 250px 1fr; gap: 10px; }
      .sidebar { padding: 15px; }
      .main { padding: 15px; }
    }
    
    @media (max-width: 768px) {
      .wrapper { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4em; }
      .tabs { margin-bottom: 15px; }
      .defect-info { grid-template-columns: 1fr; }
      .sidebar { max-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Kiểm Tra Chất Lượng Sản Phẩm</h1>
      <p>Phát hiện lỗi bằng AI Vision</p>
    </header>
    
    <div class="wrapper">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h3>📸 Tải Lên Ảnh</h3>
        
        <div class="upload-box" id="uploadBox">
          <div class="upload-icon">📷</div>
          <div class="upload-text">Kéo thả ảnh</div>
          <div class="upload-sub">hoặc nhấp để chọn</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        <img id="preview" alt="Preview">
        <div id="fileInfo"></div>
        
        <div class="form-group">
          <label>Độ Tin Cậy</label>
          <input type="range" id="confidenceSlider" min="0" max="100" value="25" step="5">
          <div style="margin-top: 5px;">
            <span class="value-badge" id="confidenceValue">0.25</span>
          </div>
        </div>
        
        <button class="btn-primary" id="uploadBtn">🚀 Kiểm Tra</button>
        <div class="status" id="status"></div>
      </div>
      
      <!-- MAIN -->
      <div class="main">
        <div class="tabs">
          <button class="tab-btn active" data-tab="results">📊 Kết Quả</button>
          <button class="tab-btn" data-tab="history">📜 Lịch Sử</button>
        </div>
        
        <div class="tab-content active" id="results">
          <div id="resultsContainer" class="empty-state">
            👆 Tải lên ảnh để xem kết quả
          </div>
        </div>
        
        <div class="tab-content" id="history">
          <div id="historyContainer" class="empty-state">
            Chưa có lịch sử kiểm tra
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const confidenceSlider = document.getElementById('confidenceSlider');
    const confidenceValue = document.getElementById('confidenceValue');
    
    let selectedFile = null;
    
    uploadBox.addEventListener('click', () => fileInput.click());
    
    uploadBox.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadBox.classList.add('drag');
    });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag'));
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadBox.classList.remove('drag');
      handleFile(e.dataTransfer.files[0]);
    });
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    
    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        fileInfo.innerHTML = `<strong>${file.name}</strong><br>${sizeMB} MB`;
      };
      reader.readAsDataURL(file);
    }
    
    confidenceSlider.addEventListener('input', (e) => {
      confidenceValue.textContent = (e.target.value / 100).toFixed(2);
    });
    
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        showStatus('Vui lòng chọn ảnh', 'error');
        return;
      }
      uploadBtn.disabled = true;
      showStatus('<span class="spinner"></span>Đang xử lý...', 'info');
      try {
        const confidence = confidenceSlider.value / 100;
        const result = await apiClient.inspectImage(selectedFile, confidence);
        displayResults(result);
        saveHistory(result);
        showStatus('✅ Kiểm tra thành công!', 'success');
      } catch (error) {
        showStatus('❌ ' + error.message, 'error');
      } finally {
        uploadBtn.disabled = false;
      }
    });
    
    function resolveImageUrl(url) {
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      return `${apiClient.baseUrl}/${url.replace(/^\/?/, '')}`;
    }
    
    function displayResults(data) {
      const container = document.getElementById('resultsContainer');
      const { predictions = [], result_image_url, report = {}, vqa_quick_answers = {}, total_defects = 0 } = data;
      const imageUrl = resolveImageUrl(result_image_url);
      
      let html = '';
      
      if (report.verdict) {
        const verdictMap = {
          'PASS': { class: 'verdict-pass', icon: '✅', label: 'ĐẠT' },
          'FLAG': { class: 'verdict-flag', icon: '⚠️', label: 'CẢNH BÁO' },
          'REJECT': { class: 'verdict-reject', icon: '❌', label: 'KHÔNG ĐẠT' }
        };
        const v = verdictMap[report.verdict] || verdictMap['PASS'];
        html += `
          <div class="verdict-badge ${v.class}">
            <div class="verdict-icon">${v.icon}</div>
            <div>
              <div class="verdict-status">${v.label}</div>
              <div class="verdict-desc">${report.summary || 'Kiểm tra hoàn thành'}</div>
            </div>
          </div>
        `;
      }
      
      if (total_defects !== undefined) {
        html += `<div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Tổng Lỗi</div>
            <div class="stat-value">${total_defects}</div>
          </div>
          ${report.confidence ? `<div class="stat-box">
            <div class="stat-label">Độ Tin Cậy</div>
            <div class="stat-value">${Math.round(report.confidence * 100)}%</div>
          </div>` : ''}
        </div>`;
      }
      
      if (imageUrl) {
        html += `
          <div class="image-section">
            <div class="image-caption">🖼️ Ảnh Kết Quả Phát Hiện</div>
            <img src="${imageUrl}" class="result-image" alt="Result" onerror="this.style.display='none'">
          </div>
        `;
      }
      
      if (predictions?.length > 0) {
        html += '<div class="section-title">� Chi Tiết Lỗi Phát Hiện <span style="font-size: 0.85em; color: #999;">(Tổng: ' + predictions.length + ')</span></div>';
        
        // Helper to safely extract numeric values
        const getNumVal = (val) => {
          if (typeof val === 'number') return val;
          if (typeof val === 'object' && val !== null) {
            const v = val.value !== undefined ? val.value : val;
            return Number(v) || 0;
          }
          return Number(val) || 0;
        };
        
        predictions.forEach((p, idx) => {
          let conf = p.confidence;
          if (typeof conf === 'object' && conf.SCORE) conf = conf.SCORE / 100;
          conf = ((conf || 0) * 100);
          
          let sev = p.severity || 'NORMAL';
          if (typeof sev === 'object') sev = sev.LEVEL || 'NORMAL';
          sev = String(sev).toUpperCase().trim();
          
          const sevColors = { 'HIGH': '#f44336', 'MEDIUM': '#ff9800', 'LOW': '#ffc107', 'NORMAL': '#4caf50', 'CRITICAL': '#c62828' };
          
          // Get area, x, y safely
          const area = p.area ? getNumVal(p.area).toFixed(1) : 'N/A';
          const xPos = p.x !== undefined ? getNumVal(p.x).toFixed(1) : 'N/A';
          const yPos = p.y !== undefined ? getNumVal(p.y).toFixed(1) : 'N/A';
          
          let infoHtml = `
                <div class="info-row">
                  <span class="info-label">📊 Độ Tin Cậy</span>
                  <span class="info-value">${conf.toFixed(1)}%</span>
                </div>
                <div class="info-row">
                  <span class="info-label">📏 Diện Tích</span>
                  <span class="info-value">${area}${typeof area !== 'string' ? ' px²' : ''}</span>
                </div>`;
          
          if (xPos !== 'N/A') {
            infoHtml += `<div class="info-row">
                  <span class="info-label">📍 Tọa Độ X</span>
                  <span class="info-value">${xPos}</span>
                </div>`;
          }
          if (yPos !== 'N/A') {
            infoHtml += `<div class="info-row">
                  <span class="info-label">📍 Tọa Độ Y</span>
                  <span class="info-value">${yPos}</span>
                </div>`;
          }
          if (p.class) {
            infoHtml += `<div class="info-row">
                  <span class="info-label">🏷️ Loại Lỗi</span>
                  <span class="info-value">${p.class}</span>
                </div>`;
          }
          
          html += `
            <div class="defect-card">
              <div class="defect-header">
                <div class="defect-name">#${idx + 1} ${p.defect_type || 'Lỗi'}</div>
                <span class="severity-badge" style="background: ${sevColors[sev] || '#999'};">${sev}</span>
              </div>
              <div class="defect-info">
                ${infoHtml}
              </div>
            </div>
          `;
        });
      } else if (total_defects === 0) {
        html += '<div style="text-align: center; padding: 25px; background: #e8f5e9; border-radius: 8px; color: #4caf50; font-weight: 600; margin: 15px 0;">✅ Không phát hiện lỗi</div>';
      }
      
      if (report.recommendations?.length > 0) {
        html += `<div class="section-title">💡 Khuyến Cáo</div>
          <div class="report-box">
            <div class="report-content">
              ${report.recommendations.map(r => `<div style="margin-bottom: 6px;">• ${r}</div>`).join('')}
            </div>
          </div>`;
      }
      
      container.innerHTML = html || '<div class="empty-state">Không có dữ liệu</div>';
      switchTab('results');
    }
    
    function saveHistory(data) {
      let history = JSON.parse(localStorage.getItem('history') || '[]');
      history.unshift({
        verdict: data.report?.verdict || 'UNKNOWN',
        time: new Date().toLocaleString('vi-VN'),
        defects: data.total_defects || 0
      });
      localStorage.setItem('history', JSON.stringify(history.slice(0, 50)));
      loadHistory();
    }
    
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('history') || '[]');
      const container = document.getElementById('historyContainer');
      
      if (!history.length) {
        container.innerHTML = '<div class="empty-state">Chưa có lịch sử</div>';
        return;
      }
      
      let html = '';
      history.forEach((item, idx) => {
        const vmap = { 'PASS': '#4caf50', 'FLAG': '#ff9800', 'REJECT': '#f44336' };
        const lmap = { 'PASS': 'ĐẠT', 'FLAG': 'CẢNH BÁO', 'REJECT': 'KHÔNG ĐẠT' };
        
        html += `
          <div class="history-item">
            <div class="history-info">
              <div style="font-weight: 600;">Kiểm tra #${idx + 1}</div>
              <div class="history-time">${item.time}</div>
              <div style="font-size: 0.8em; color: #667eea; margin-top: 3px;">Lỗi: ${item.defects}</div>
            </div>
            <div class="history-badge" style="background: ${vmap[item.verdict] || '#999'};">
              ${lmap[item.verdict] || item.verdict}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }
    
    function showStatus(msg, type) {
      status.innerHTML = msg;
      status.className = `status show status-${type}`;
      if (type === 'success') setTimeout(() => status.classList.remove('show'), 3000);
    }
    
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    
    loadHistory();
  </script>
</body>
</html>
